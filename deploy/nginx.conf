# nginx-конфиг для тренажёра мнемотехники
# Файл положить в: /etc/nginx/sites-available/mnemonics
# Затем: ln -s /etc/nginx/sites-available/mnemonics /etc/nginx/sites-enabled/
#
# ЗАМЕНИТЕ:
#   - example.ru на ваш реальный домен (в двух местах)
#   - /var/www/mnemonics-trainer на путь, куда вы склонировали проект

server {
    listen 80;
    listen [::]:80;
    server_name example.ru www.example.ru;

    # Корень — собранный фронтенд (статические файлы)
    root /var/www/mnemonics-trainer/artifacts/mnemonics/dist/public;
    index index.html;

    # Размер загружаемых данных
    client_max_body_size 5M;

    # Сжатие
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → Express-сервер на порту 8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Кэширование статических ассетов (js/css/картинки)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA — любой неизвестный маршрут отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
